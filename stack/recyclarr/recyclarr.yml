# Recyclarr — syncs TRaSH Guides quality profiles & custom formats to Sonarr/Radarr.
# Runs once on stack startup, then on cron weekly.
# Docs: https://recyclarr.dev/

sonarr:
  gecko_sonarr:
    base_url: http://media_sonarr:8989
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: false

    quality_definition:
      type: series

    quality_profiles:
      - name: WEB-1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: WEBDL-1080p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: WEBDL-1080p
            qualities: [WEBDL-1080p, WEBRip-1080p]
          - name: HDTV-1080p
          - name: WEBDL-720p
            qualities: [WEBDL-720p, WEBRip-720p]

    custom_formats:
      # TRaSH Custom Formats for unwanted releases (negative scores).
      # Replace these with real TRaSH IDs from https://trash-guides.info/Sonarr/sonarr-collection-of-custom-formats/
      - trash_ids:
          - ed7f1e315e000aef424a58517fa48727   # placeholder — replace with real ID
        assign_scores_to:
          - name: WEB-1080p
            score: -10000

radarr:
  gecko_radarr:
    base_url: http://media_radarr:7878
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: false

    quality_definition:
      type: movie

    quality_profiles:
      - name: HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: Bluray-1080p
          - name: WEBDL-1080p
            qualities: [WEBDL-1080p, WEBRip-1080p]
          - name: Bluray-720p
          - name: WEBDL-720p
            qualities: [WEBDL-720p, WEBRip-720p]

    custom_formats:
      # CAM / Telecine / Hardcoded subs (block).
      # Real TRaSH IDs go here — see https://trash-guides.info/Radarr/Radarr-collection-of-custom-formats/
      - trash_ids:
          - 1bef6c151fdcf26c41b16886382f5418   # placeholder
        assign_scores_to:
          - name: HD Bluray + WEB
            score: -10000
