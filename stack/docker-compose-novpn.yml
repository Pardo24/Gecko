# ============================================================
# Media Stack — Jellyfin + *arr + qBittorrent (sense VPN)
#
# NOTA: Los configs de servicios usan volúmenes Docker internos
# (ext4 dentro de la VM de Docker) para evitar corrupción de
# SQLite en NTFS/Windows. Los archivos de media siguen en
# DATA_PATH porque son solo ficheros grandes, no bases de datos.
# ============================================================

networks:
  media_net:
    name: media_net
    driver: bridge

services:

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: media_jellyfin
    restart: unless-stopped
    networks:
      - media_net
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
      - "1900:1900/udp"
    volumes:
      - jellyfin_config:/config           # volumen interno — SQLite protegido
      - jellyfin_cache:/cache             # volumen interno — cache transcoding
      - ${DATA_PATH}/jellyfin/media/movies:/media/movies
      - ${DATA_PATH}/jellyfin/media/series:/media/series
      - ${DATA_PATH}/jellyfin/media/music:/media/music
    environment:
      TZ: ${TZ:-Europe/Madrid}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: media_jellyseerr
    restart: unless-stopped
    networks:
      - media_net
    ports:
      - "${JELLYSEERR_PORT:-5055}:5055"
    volumes:
      - jellyseerr_config:/app/config     # volumen interno — SQLite protegido
    environment:
      TZ: ${TZ:-Europe/Madrid}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: media_prowlarr
    restart: unless-stopped
    networks:
      - media_net
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    volumes:
      - prowlarr_config:/config           # volumen interno — SQLite protegido
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Europe/Madrid}
      X_API_KEY: ${PROWLARR_API_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: media_radarr
    restart: unless-stopped
    networks:
      - media_net
    ports:
      - "${RADARR_PORT:-7878}:7878"
    volumes:
      - radarr_config:/config             # volumen interno — SQLite protegido
      - ${DATA_PATH}/downloads:/downloads
      - ${DATA_PATH}/jellyfin/media/movies:/movies
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Europe/Madrid}
      X_API_KEY: ${RADARR_API_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: media_sonarr
    restart: unless-stopped
    networks:
      - media_net
    ports:
      - "${SONARR_PORT:-8989}:8989"
    volumes:
      - sonarr_config:/config             # volumen interno — SQLite protegido
      - ${DATA_PATH}/downloads:/downloads
      - ${DATA_PATH}/jellyfin/media/series:/tv
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Europe/Madrid}
      X_API_KEY: ${SONARR_API_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: media_lidarr
    restart: unless-stopped
    networks:
      - media_net
    ports:
      - "${LIDARR_PORT:-8686}:8686"
    volumes:
      - lidarr_config:/config             # volumen interno — SQLite protegido
      - ${DATA_PATH}/downloads:/downloads
      - ${DATA_PATH}/jellyfin/media/music:/music
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Europe/Madrid}
      X_API_KEY: ${LIDARR_API_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: media_bazarr
    restart: unless-stopped
    networks:
      - media_net
    ports:
      - "${BAZARR_PORT:-6767}:6767"
    volumes:
      - bazarr_config:/config             # volumen interno — SQLite protegido
      - ${DATA_PATH}/jellyfin/media/movies:/movies
      - ${DATA_PATH}/jellyfin/media/series:/tv
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Europe/Madrid}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: media_qbittorrent
    restart: unless-stopped
    networks:
      - media_net
    ports:
      - "${QBIT_PORT:-8090}:8080"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - ${DATA_PATH}/qbittorrent:/config  # bind mount — password pre-set by Gecko
      - ${DATA_PATH}/downloads:/downloads
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Europe/Madrid}
      WEBUI_PORT: 8080
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # Gecko Cleaner — limpieza automática de descargas estancadas/fallidas
  gecko-cleaner:
    build: ./cleaner
    container_name: media_cleaner
    restart: unless-stopped
    networks:
      - media_net
    environment:
      RADARR_HOST: http://media_radarr:7878
      RADARR_API_KEY: ${RADARR_API_KEY}
      SONARR_HOST: http://media_sonarr:8989
      SONARR_API_KEY: ${SONARR_API_KEY}
      LIDARR_HOST: http://media_lidarr:8686
      LIDARR_API_KEY: ${LIDARR_API_KEY}
      INTERVAL_MINUTES: 10
      TZ: ${TZ:-Europe/Madrid}
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  # Gecko Init — one-shot configurator (root folders, qBit, Prowlarr↔apps,
  # Bazarr↔Sonarr/Radarr, Jellyseerr setup). Idempotent — safe to re-run.
  # Replaces ~500 lines of TS in src/autoSetup.ts.
  gecko-init:
    build: ./gecko-init
    container_name: media_gecko_init
    restart: "no"
    networks:
      - media_net
    profiles: ["init"]      # only runs when explicitly invoked: `docker compose --profile init up gecko-init`
    environment:
      SONARR_URL: http://media_sonarr:8989
      SONARR_API_KEY: ${SONARR_API_KEY}
      RADARR_URL: http://media_radarr:7878
      RADARR_API_KEY: ${RADARR_API_KEY}
      LIDARR_URL: http://media_lidarr:8686
      LIDARR_API_KEY: ${LIDARR_API_KEY}
      PROWLARR_URL: http://media_prowlarr:9696
      PROWLARR_API_KEY: ${PROWLARR_API_KEY}
      BAZARR_URL: http://media_bazarr:6767
      BAZARR_API_KEY: ${BAZARR_API_KEY}
      JELLYSEERR_URL: http://media_jellyseerr:5055
      JELLYFIN_URL: http://media_jellyfin:8096
      QBIT_HOST: ${QBIT_HOST:-media_qbittorrent}   # no-VPN: direct connection to qbit container
      QBIT_PORT: "8080"                            # qBit's internal port; QBIT_PORT in .env is the external mapping
      QBIT_USER: admin
      QBIT_PASS: ${ADMIN_PASSWORD}
      TV_PATH: /tv
      MOVIES_PATH: /movies
      MUSIC_PATH: /music
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SUBTITLE_LANGS: ${SUBTITLE_LANGS:-spa,eng}

  # Recyclarr — syncs TRaSH Guides quality profiles & custom formats.
  # Runs once at startup + weekly cron. Compatible with Sonarr v4 / Radarr v5.
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: media_recyclarr
    restart: unless-stopped
    user: "1000:1000"
    networks:
      - media_net
    volumes:
      - ./recyclarr:/config
    environment:
      TZ: ${TZ:-Europe/Madrid}
      CRON_SCHEDULE: "@daily"
      SONARR_API_KEY: ${SONARR_API_KEY}
      RADARR_API_KEY: ${RADARR_API_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # Buildarr — declarative config for Prowlarr (indexers, app sync).
  # Skipped for Sonarr/Radarr because plugins are not compatible with v4/v5.
  buildarr:
    image: callum027/buildarr:0.7.1
    container_name: media_buildarr
    restart: "no"
    networks:
      - media_net
    volumes:
      - ./buildarr:/config
      - buildarr_state:/state
    environment:
      TZ: ${TZ:-Europe/Madrid}
      PUID: 1000
      PGID: 1000
      PROWLARR_API_KEY: ${PROWLARR_API_KEY}
    command: ["run", "/config/buildarr.yml"]
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

# ============================================================
# Volúmenes Docker internos — protegen las DBs SQLite de la
# corrupción causada por NTFS + WSL2 + Docker Desktop en Windows
# Docker los crea automáticamente en el primer `docker compose up`
# ============================================================
volumes:
  jellyfin_config:
  jellyfin_cache:
  jellyseerr_config:
  prowlarr_config:
  radarr_config:
  sonarr_config:
  lidarr_config:
  bazarr_config:
  buildarr_state: